body:
  text: 形墳地皇軒轅氏乾坤易爻卦大象乾形天地天降氣日天中道月天夜明山天曲上川天曲下雲天成陰氣天習蒙坤形地天地圓丘日地圜宮月地斜曲山地險徑川地廣平雲地高林氣地下濕陽形日天日昭明地日景隨日月從朔山日沉西川日流光雲日蔽霠氣日昏蔀陰形月天月淫地月伏輝日月代明山月升騰川月東浮雲月藏宮氣月冥陰土形山天山嶽地山磐石日山危峰月山斜巔川山島雲山岫氣山巖水形川天川漢地川河日川湖月川曲池山川澗雲川溪氣川泉雨形雲天雲祥地雲黃霙日雲赤曇月雲素雯山雲疊峰山雲流瘴氣雲散彩風形氣天氣垂氤地氣騰氳日氣晝圍月氣夜圓山氣籠煙川氣浮光雲氣流霞傳乾形天聖人以仰觀天象地天降氣聖人以推中氣正歲年日天中道聖人以分晝景月天夜明聖人以辨昏象山天曲上聖人以慎行求諫川天曲下聖人以察姦佞雲天成陰聖人以澤蔭庶物氣天習蒙聖人以至明燭幽坤形地聖人以辨方隅天地圓丘聖人以祀上帝日地圜宮聖人以祭日月地斜曲聖人以正經界山地險徑聖人以通道路川地廣平聖人以設溝洫雲地高林聖人以教人取材氣地下濕聖人以教民漉網陽形日聖人以繼明照下天日昭明聖人以求賢代明地日景隨聖人以德教化民日月從朔聖人以推氣候山日沉西聖人以思賢繼治川日流光聖人以恩及蟲魚雲日蔽霠聖人以明察左右氣日昏蔀聖人以修省國政陰形月聖人以命相代政天月淫聖人以機密大臣地月伏輝聖人以訪求賢隱日月代明聖人以君臣代政山月升騰聖人以命相統治川月東浮聖人以恩及命婦雲月藏宮聖人以慎內政氣月冥陰聖人以慎群小土形山聖人以正名嶽鎮天山嶽聖人以嚴恭崇祀地山磐石聖人以深固基業日山危峰聖人以慎孤高月山斜巔聖人以慎危覆川山島聖人以防濫僭雲山岫聖人以振財祿賢氣山巖聖人以深宮養性水形川聖人以設法無弊天川漢聖人以辨時候地川河聖人以紀地理日川湖聖人以聚財養士月川曲池聖人以教民漉網山川澗聖人以通江海雲川溪聖人以思求隱逸氣川泉聖人以通溉民田雨形雲聖人以雲瑞紀官天雲祥聖人以符應天命地雲黃霙聖人以土德推曆日雲赤曇聖人以防慎火災月雲素雯聖人以占測治亂山雲疊峰聖人以意決災異川雲流瘴聖人以防備水患氣雲散彩聖人以決兵勝敗風形氣聖人以決亂天氣垂氤聖人以辨時候地氣騰氳聖人以辨妖孽日氣晝圍聖人以決災變月氣夜圓聖人以定方象山氣籠煙聖人以取金玉川氣浮光聖人以採珠寶雲氣流霞聖人以辨怪異地皇軒轅氏政典皇曰嗟爾天師俌相正五百官士子農夫商人工技咸若我言政典曰國無邪教市無淫貨地無荒土官無濫士邑無遊民山不童澤不涸其正道至矣正道至則官有常職民有常業父子不背恩夫婦不背情兄弟不去義禽獸不失長草木不失生政典曰方圓角直曲斜凹凸必有形遠近高下長短疾緩必有制寒暑燥濕風雨逆順必有時金木水火土石羽毛必有濟布帛桑麻筋角齒革必有用百工器用必有制聖人治天下權以聚財財以施智智以傗賢賢以輔道道以統下下以事上上以施仁仁以保位位以制義義以俌禮禮以制情情以敦信信以一德德以明行行以崇教教以歸政政以崇化化以順性性以存命命以保生生以終壽皇曰岐伯天師爾司日月星辰陰陽曆數爾正爾考無有差貣先時者殺不及時者殺爾惟戒哉皇曰后土中正爾識山川草木蟲魚鳥獸爾掌爾察無亂田制以作田訟爾惟念哉皇曰龍東正爾分爵祿賢智爾咨爾行無掩大賢以吝財無庇惡德以私賞皇曰融南正爾平禮服祭祀爾正爾惟無亂國制以僭上無廢祀事以簡恭爾惟念哉皇曰太封西正爾分干戈刑法爾掌爾平皇曰太常北正爾居田制民事爾訓爾均百工惟良山川爾圖爾惟勤恭哉皇曰天師俌相五正百官士子農夫商人工技咸順我言終身於休
