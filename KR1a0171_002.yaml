body:
  text: 氣墳人皇神農氏歸藏易爻卦大象天氣歸歸藏定位歸生魂歸動乘舟歸長兄歸育造物歸止居域歸殺降地氣藏藏歸交藏生卵藏動鼠藏長姊藏育化物藏止重門藏殺盜木氣生生歸孕生藏害生動勳陽生長元胎生育澤生止性生殺相剋風氣動動歸乘軒動藏受種動生機動長風動育源動止戒動殺虐火氣長長歸從師長藏從夫長生志長動麗長育違道長止平長殺順性水氣育育歸流育藏海育生愛育動漁育長苗育止養育殺傗山氣止止歸約止藏淵止生貌止動濟止長植物止育潤止殺寬宥金氣殺殺歸尸殺藏墓殺生無忍殺動干戈殺長戰殺育無傷殺止亂傳天氣歸聖人以禮下賢智歸藏定位聖人以儀辨尊卑歸生魂聖人以明神變歸動乘舟聖人以造舟楫歸長兄聖人以辨兄弟歸育造物聖人以明天意歸止居域聖人以居生民歸殺降聖人以存歸類地氣藏聖人以藏智於國藏歸交聖人以道接生靈藏生卵聖人以仁及飛鳥藏動鼠聖人以防佞幸藏長姊聖人以分男女藏育化物聖人以察地理藏止重門聖人以謹啓閉藏殺盜聖人以防民亂木氣生聖人以行仁政生歸孕聖人以察生産生藏害聖人以異居室生動勳陽聖人以行慶錫生長元胎聖人以測大象生育澤聖人以待天時生止性聖人以隨民心順民性生殺相剋聖人以防民事風氣動聖人以宣號令動歸乘軒聖人以造車輪動藏受種聖人以播百穀動生機君子以通變化動長風聖人以通達治道動育源聖人以溉灌民田動止戒聖人以慎起居防禍亂動殺虐聖人以戒殺伐火氣長聖人以明長幼長歸從師聖人以立學教民長藏從夫聖人以教婦道長生志聖人以量能受事長動麗聖人以置網罟長育違道聖人以防民逆長止平聖人以均有無平阿黨長殺順性聖人以盡物壽水氣育聖人以教民育材育歸流聖人以疏通群議育藏海聖人以仁廣納萬慮育生愛聖人以恤窮民育動漁聖人以教民漁網育長苗聖人以教農鋤耨育止養聖人以教民孝育教傗聖人以教養六畜山氣止聖人以安萬國止歸約聖人以教民歸信止藏淵聖人以深治道止生貌聖人以形辨貴賤色正賢否止動濟聖人以置民器利民用止長植物聖人以名草藥辨味性止育潤聖人以開河渠澤潤草木止殺寬宥聖人以御凶亂金氣殺聖人以順天殺物殺歸尸聖人以封丘之殺藏墓聖人以穴丘之殺生無忍聖人以遠庖廚殺動干戈聖人以定禍亂殺長戰聖人以陳卒伍殺育無傷聖人以用非常殺止亂聖人以刑伐格治人皇神農氏政典政典曰惟天生民惟君奉天惟食喪祭衣服教化一歸於政皇曰我惟生無德咸若古政嗟爾四方之君有官有業乃子乃父乃兄乃弟無亂於政昔二君始王未有書契結繩而治交易而生亦惟歸政昔在天皇肇修文教始畫八卦明君臣民物陰陽兵象以代結繩之政出言惟辭制器惟象動作惟變卜筮惟占天皇氏歸氣我惟代政惟若古道以立政皇曰正天時因地利惟厚於民民惟邦本食惟民天農不正食不豐民不正業不專惟民有數惟食有節惟農有教林林生人無亂政典政典曰君正一道二三凶臣正一德有常吉時正惟四亂時不植氣正惟和氣亂作癘官正惟百民正惟四色正惟五惟質惟良病正四百四藥正三百六十五過數乃亂而昏而毒道正常過政反僻刑正平過政反私祿正滿過政反侈禮正度過政反僭樂正和過政反流治正簡過政反亂喪正哀過政反遊干戈正亂過政反危市肆正貨過政反邪譏禁正非過政失用皇曰嗟爾有官有業乃子乃父乃兄乃弟咸若我辭一歸於正皇曰君相信任惟正相君俌位惟忠相官統治惟公官相代位惟勤民官撫愛惟仁官民事上惟業父無不義厥子惟孝兄無不友厥弟惟恭夫不遊妻不淫師不怠教不失刑者形也形爾身道者導也導爾志禮者制也制爾情樂者和也和爾聲政者正也正其事
