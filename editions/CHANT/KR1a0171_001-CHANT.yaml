body:
  text: 山墳天皇伏犧氏連山易爻卦大象崇山君君臣相君民官君物龍君陰后君陽師君兵將君象首伏山臣臣君侯臣民士臣物龜臣陰子臣陽父臣兵卒臣象股列山民民君食民臣力民物貨民陰妻民陽夫民兵器民象體兼山物物君金物臣木物民土物陰水物陽火物兵執物象春潛山陰陰君土陰臣野陰民鬼陰物獸陰陽樂陰兵妖陰象冬連山陽陽君天陽臣幹陽民神陽物禽陽陰禮陽兵譴陽象夏藏山兵兵君帥兵臣佐兵民軍兵物材兵陰謀兵陽陣兵象秋疊山象象君日象臣月象民星象物雲象陰夜象陽晝象兵氣傳崇山君崇高其山君之象也君臣相相位至貴君之臣也君民官君臨百官以為民也君物龍龍善變化能致雲雨為君物也君陰后君妻曰后正婚姻也君陽師君師賢聖以詢道也君兵將君不兵眾專務將佐也君象首首統方來君之象也伏山臣潛伏其山臣之象也臣君侯建侯君民分方治也臣民士士守常業臣之民也臣物龜死不改𡵒勸以義也臣陰子子為臣陰訓事父也臣陽父父為臣陽以訓子也臣兵卒臣以卒為兵假其力也臣象股臣象股肱以佐身也列山民山有行列民之象也民君食民所尊崇以食為本務故為君矣民臣力民之使力如君使臣也民物貨四民之物以貨為本也民陰妻民之有妻以成家也民陽夫女之從夫以有歸也民兵器生民之兵以利用也民象體民為邦本如肌體也兼山物高下相兼物之象也物君金金主利用物之君也物臣木木為金所剋服故為臣矣物民土土生萬類為物民矣物陰水水性潤下物之陰也物陽火火性炎上物之陽也物兵執物之相剋勝制故為兵也物象春春主發生物之象也潛山陰深潛其山陰之象也陰君土地德廣大為陰君也陰臣野野分地理故為陰臣也陰民鬼人死曰鬼陰之民也陰物獸獸行于地陰之物也陰陽樂樂本聲音為陰之陽也陰兵妖陰告人主厥罰妖異也陰象冬冬主閉藏陰之象也連山陽山之相連如陽氣也陽君天天覆群物陽之君也陽臣幹十幹相配陽之臣也陽民神神變萬物陽之民也陽物禽禽飛戾天陽之物也陽陰禮禮主卑己陽之陰也陽兵譴天垂譴象陽之兵也陽象夏夏長萬物陽之象也藏山兵藏剛于地兵之象也兵君帥帥以統眾兵之君也兵臣佐佐以輔帥兵之臣也兵民軍軍有行列兵之民也兵物材山生五材兵之物也兵陰謀謀善計兵之陰也兵陽陣陣兵誓眾兵之陽也兵象秋秋主殺物兵之象也疊山象石疊其山如天象也象君日日為陽精象之君也象臣月月為陰精象之臣也象民星星有行列明象照也象物雲雲有異形象萬物也象陰夜夜景幽暗象之陰也象陽晝晝日明察象之陽也象兵氣氣形妖異象之兵也太古河圖代姓紀清氣未升濁氣未沉遊神未靈五色未分中有其物冥冥而性存謂之混沌混沌為太始太始者元胎之萌也太始之數一一為太極太極者天地之父母也一極易天高明而清地博厚而濁謂之太易太易者天地之變也太易之數二二為兩儀兩儀者陰陽之形也謂之太初太初者天地之交也太初之數四四盈易四象變而成萬物謂之太素太素者三才之始也太素之數三三盈易天地孕而生男女謂之三才三才者天地之備也遊神動而靈故飛走潛化動植蟲魚之類必備於天地之間謂之太古太古者生民之始也太古之人皆壽盈易始三男三女冬聚夏散食鳥獸蟲魚草木之實而男女搆精以女生為姓始三頭謂之合雄紀生子三世合雄氏沒子孫相傳記其壽命謂之敘命紀通紀四姓生子二世男女眾多群居連逋從強而行是謂連逋紀生子一世通紀五姓是謂五姓紀天下群居以類相親男女眾多分為九頭各有居方故號居方氏居方氏沒生子三十二世強弱相迫欲生吞害中有神人提挺而治故號提挺氏提挺氏生子三十五世通紀七十二姓故號通姓氏有巢氏生太古之先覺識於天地草木蟲魚鳥獸俾人居巢穴積鳥獸之肉聚草木之實天下九頭咸歸有巢始君也動止群群相聚而尊事之壽一太易本通姓氏之後也燧人氏有巢子也生而神靈教人炮食鑽木取火天下生靈尊事之始有日中之市交易其物有傳教之臺有結繩之政壽一太易本通姓氏之後也伏犧氏燧人子也因風而生故風姓末甲八太七成三十二易草木草生月雨降日河汎時龍馬負圖蓋分五色文開五易甲象崇山天皇始畫八卦皆連山名易君臣民物陰陽兵象始明於世圖出後二成二十二易草木木枯月命臣飛龍氏造六書後草木一易木王月命臣潛龍氏作甲曆伏制犧牛治金成器教民炮食易九頭為九牧因尊事為禮儀因龍出而紀官因鳳來而作樂命降龍氏和率萬民命水龍氏平治水土命火龍氏炮治器用因居方而置城郭天下之民號曰天皇太昊伏犧有庖升龍氏本通姓氏之後也天皇伏犧氏皇策辭昔在天皇居於君位咨於將咨於相咨於民垂皇策辭皇曰惟我生無道承父居方三十二易草木上升君位我父燧皇歸世未降河圖生民結繩而無不信於末甲八太七成三十二易草木惟我老極時生人眾多群群蟲聚欲相吞害惟天至仁於草生月天雨降河龍馬負圖神開我心子其未生我畫八卦自上而下咸安其居後二成二十二易草木皇曰命子襄居我飛龍之位主我圖文代我咨於四方上下無或私襄曰咸若咨眾之辭君無念哉後一易草木皇曰命子英居我潛龍之位主我陰陽甲曆咨於四方上下無或差英曰依其法亦順君無念哉皇曰無為後二十二易草木昊英氏進曆於君曰曆起甲寅皇曰甲日寅辰乃鳩眾於傳教臺告民示始甲寅易二月天王升傳教臺乃集生民后女媧子無懷俌民之右上相共工下相皇桓飛龍朱襄氏潛龍昊英氏居君左右栗陸氏居北赫胥氏居南昆連氏居西葛天氏居東陰康氏居下九州之牧各統其人群居於外皇曰咨予上相共工我惟老極無為子惟扶我正道咨告於民俾知甲曆日月歲時自茲始無或不記子勿怠共工曰工居君臣之位無有勞君其念哉皇曰下相皇桓我惟老極無為子惟扶我正道撫愛下民同力咨告於民俾知甲曆日月歲時自茲始無或不記子其勿怠桓曰居君臣之位無有勞君其念哉皇曰栗陸子居我水龍之位主養草木開道泉源無或失時子其勿怠陸曰竭力於民君其念哉皇曰大庭主我屋室視民之未居者喻之借力同搆其居無或寒凍庭曰順民之辭皇曰陰康子居水土俾民居處無或漂流勤於道達於下康曰順君之辭皇曰渾沌子居我降龍之位惟主於民皇曰昆連子主我刀斧無俾野獸犧虎之類傷殘生命無俾同類大力之徒區逐微弱子其伏之連曰專主兵事君無念哉皇曰四方之君咸順我辭則世無害惟愛於民則位不危皇曰子無懷安惟安於民民安子安民危子危子其念哉
